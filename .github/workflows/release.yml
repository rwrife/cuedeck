name: Release

# Build native installers on their respective OSes when a version tag is pushed
# and automatically publish those artifacts to a GitHub Release.
#
# This workflow intentionally ships unsigned artifacts (see RELEASING.md).
on:
  push:
    tags:
      - 'v*'
  # Allow manual runs for testing the packaging pipeline without cutting a tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the whole matrix if one OS fails to package.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: package:linux
            artifact: cuedeck-linux
          - os: windows-latest
            script: package:win
            artifact: cuedeck-windows
          - os: macos-latest
            script: package:mac
            artifact: cuedeck-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Full install here (unlike CI) so the Electron binary is available for
      # packaging.
      - name: Install dependencies
        run: npm ci

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid release tag '$TAG' (expected v<semver>)" >&2
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Package
        run: npm run ${{ matrix.script }} -- --publish never
        env:
          # Fail loudly instead of silently skipping unsigned builds; signing is
          # explicitly out of scope for this workflow.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip

  publish-release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cuedeck-*
          merge-multiple: true
          path: dist

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CueDeck ${{ github.ref_name }}
          files: |
            dist/*
          fail_on_unmatched_files: true
