name: CI

# Run the full quality gate on every push and pull request so regressions
# introduced by automated (or human) PRs are caught before they reach master.
on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest

    env:
      # This is a headless CI run: only typecheck/lint/test/build are exercised,
      # so skip downloading the Electron binary during `npm ci` to keep it fast.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
